<!DOCTYPE html>
<html lang="it" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">

    <!-- Cache control -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
    <link rel="icon" type="image/png" sizes="96x96" href="/assets/favicon-96x96.png">
    <link rel="shortcut icon" href="/assets/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="manifest" href="/assets/manifest.json">

    <!-- Viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#111314">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="F1FT">

    <!-- Primary Meta Tags -->
    <title>F1FT</title>
    <meta name="title" content="F1 Fantasy Tracker">
    <meta name="description" content="F1 Fantasy Tracker — track your F1 Fantasy league standings, race results, head-to-head stats and more.">
    <meta name="author" content="Erik Gurzau">

    <!-- Styles -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/banner.css">
    <link rel="stylesheet" href="./css/standings.css">
    <link rel="stylesheet" href="./css/carousel.css">
    <link rel="stylesheet" href="./css/hub.css">
    <link rel="stylesheet" href="./css/stats.css">
    <link rel="stylesheet" href="./css/h2h.css">
    <link rel="stylesheet" href="./css/misc.css">
    <link rel="stylesheet" href="./css/boot-screen.css">
</head>
<body>
<div id="boot-cover"></div>
<div class="wrap p-3">

    <header class="bb pb-3 mb-4 mt-2">
        <div class="subtitle" id="app-subtitle">F1FT</div>
        <h1 id="league-name" class="m-0 fw-bold text-uppercase" style="font-size:2.3rem">—</h1>
        <div id="live-clock" class="label mt-1">—</div>
        <div id="updated-status" class="label mt-1"></div>
    </header>

    <div id="banner" class="banner mb-4"></div>

    <!-- NAV TABS -->
    <nav class="nav-tabs-db pt-3 mb-0">
        <button class="nav-tab active" onclick="switchTab('overview')"><i class="bi bi-grid"></i><span>OVERVIEW</span></button>
        <button class="nav-tab" onclick="switchTab('stats')"><i class="bi bi-graph-up"></i><span>STATISTICS</span></button>
        <button class="nav-tab" onclick="switchTab('h2h')"><i class="bi bi-arrows-collapse"></i><span>HEAD-TO-HEAD</span></button>
    </nav>

    <!-- OVERVIEW TAB -->
    <div id="pane-overview" class="nav-pane active">
        <section class="mb-4 mt-4">
            <div class="label mb-3"><i class="bi bi-trophy me-2"></i>CURRENT_STANDING</div>
            <div class="b" id="standings-wrap"></div>
        </section>
        <section class="mb-4">
            <div class="label mb-3" style="display:flex;justify-content:space-between;align-items:center;min-height:1.6rem">
                <span><i class="bi bi-r-square me-2"></i>RACE_EXPLORER</span>
                <button id="btn-goto-current" onclick="goToCurrent()" class="btn-goto-current" style="display:none">
                    <i class="bi bi-record-circle me-1"></i>CURRENT
                </button>
            </div>
            <div class="carousel-wrap">
                <div class="carousel-controls">
                    <button class="c-arrow" onclick="shiftCar(-3)"><i class="bi bi-chevron-left"></i></button>
                    <div class="scrubber" id="scrubber" onclick="scrubberClick(event)">
                        <div class="scrubber-track">
                            <div class="scrubber-fill" id="scrubber-fill"></div>
                            <div class="scrubber-thumb" id="scrubber-thumb"></div>
                        </div>
                    </div>
                    <button class="c-arrow" onclick="shiftCar(3)"><i class="bi bi-chevron-right"></i></button>
                </div>
                <div id="carousel" class="carousel"></div>
            </div>
            <div id="hub"></div>
        </section>
    </div>

    <!-- STATISTICS TAB -->
    <div id="pane-stats" class="nav-pane">
        <div class="mt-4" id="stats-wrap"></div>
    </div>

    <!-- HEAD-TO-HEAD TAB -->
    <div id="pane-h2h" class="nav-pane">
        <div class="mt-4" id="h2h-wrap"></div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="./js/common.js"></script>
<script src="./js/data.js"></script>
<script src="./js/banner.js"></script>
<script src="./js/standings.js"></script>
<script src="./js/carousel.js"></script>
<script src="./js/hub.js"></script>
<script src="./js/stats.js"></script>
<script src="./js/h2h.js"></script>
<script src="./js/boot.js"></script>
<script src="./js/app.js"></script>

<footer class="footer-db">
    <div class="wrap px-3">
        <div class="footer-inner">
            <div class="d-flex align-items-center">
                <img src="./assets/f1ft-no-bg-logo.png" alt="F1_FANTASY_TRACKER" width="70px" height="15px" class="footer-title pe-3">
                <span class="footer-title">F1_FANTASY_TRACKER</span>
                <span class="footer-sep">//</span>
                <span class="footer-author">built by
                    <a href="https://github.com/erikgurzau" target="_blank" rel="noopener" class="footer-link">
                        <i class="bi bi-box-arrow-up-right me-1"></i>ERIK
                    </a>
                </span>
            </div>
            <div class="footer-links">
                <a href="https://fantasy.formula1.com/it/" target="_blank" rel="noopener" class="footer-link">
                    <i class="bi bi-box-arrow-up-right me-1"></i>F1 FANTASY OFFICIAL
                </a>
            </div>
        </div>
    </div>
</footer>
</body>
</html>
