<!DOCTYPE html>
<html lang="it" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>F1_FANTASY_TRACKER</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="shortcut icon" href="./assets/favicon.ico" type="image/x-icon">
    <meta name="theme-color" content="#111314">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
<div class="wrap p-3">

    <header class="bb pb-2 mb-4 mt-2">
        <div class="subtitle" id="app-subtitle">F1_FANTASY_TRACKER</div>
        <h1 id="league-name" class="m-0 fw-bold text-uppercase" style="font-size:2.3rem">—</h1>
        <div id="live-clock" class="label mt-1">—</div>
        <div id="updated-status" class="label mt-1"></div>
    </header>

    <div id="banner" class="banner mb-4"></div>

    <section class="mb-4">
        <div class="label mb-3"><i class="bi bi-trophy me-2"></i>CURRENT_STANDING</div>
        <div class="b" id="standings-wrap"></div>
    </section>

    <section class="mb-4">
        <div class="label mb-3" style="display:flex;justify-content:space-between;align-items:center;min-height:1.6rem">
            <span><i class="bi bi-r-square me-2"></i>RACE_EXPLORER</span>
            <button id="btn-goto-current" onclick="goToCurrent()" class="btn-goto-current" style="display:none">
                <i class="bi bi-record-circle me-1"></i>CURRENT
            </button>
        </div>
        <div class="carousel-wrap">
            <div class="carousel-controls">
                <button class="c-arrow" onclick="shiftCar(-3)"><i class="bi bi-chevron-left"></i></button>
                <div class="scrubber" id="scrubber" onclick="scrubberClick(event)">
                    <div class="scrubber-track">
                        <div class="scrubber-fill" id="scrubber-fill"></div>
                        <div class="scrubber-thumb" id="scrubber-thumb"></div>
                    </div>
                </div>
                <button class="c-arrow" onclick="shiftCar(3)"><i class="bi bi-chevron-right"></i></button>
            </div>
            <div id="carousel" class="carousel"></div>
        </div>
        <div id="hub"></div>
    </section>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="./js/common.js"></script>
<script src="./js/data.js"></script>
<script src="./js/banner.js"></script>
<script src="./js/standings.js"></script>
<script src="./js/carousel.js"></script>
<script src="./js/hub.js"></script>
<script src="./js/app.js"></script>

<footer class="footer-db">
    <div class="wrap px-3">
        <div class="footer-inner">
            <div>
                <span class="footer-title">F1_FANTASY_TRACKER</span>
                <span class="footer-sep">//</span>
                <span class="footer-author">built by
                    <a href="https://github.com/erikgurzau" target="_blank" rel="noopener" class="footer-link">
                        <i class="bi bi-box-arrow-up-right me-1"></i>ERIK
                    </a>
                </span>
            </div>
            <div class="footer-links">
                <a href="https://fantasy.formula1.com/it/" target="_blank" rel="noopener" class="footer-link">
                    <i class="bi bi-box-arrow-up-right me-1"></i>F1 FANTASY OFFICIAL
                </a>
            </div>
        </div>
    </div>
</footer>
</body>
</html>
