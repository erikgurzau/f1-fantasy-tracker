        :root {
            --bg-base:    #181a1b;
            --bg-surface: #242729;
            --bg-hover:   #2f3336;
            --text-main:  #e8e6e3;
            --text-muted: #a8a39d;
            --border:     #3f4448;
            --accent:     #58a6ff;
            --neg:        #ff6e64;
            --pos:        #60b68e;
            --warn:       #e3b341;
            --mer:#27F4D2; --fer:#E8002D; --red:#3333ff; --mcl:#FF8000;
            --alp:#ff87bc; --ast:#358C75; --haa:#cccccc; --wil:#005aff;
            --vrb:#6692ff; --aud:#f54418; --cad:#888888;
        }
        * { border-radius:0!important; box-shadow:none!important; font-family:'JetBrains Mono',monospace; }
        html { font-size:16px; }
        body { background:var(--bg-base); color:var(--text-main); padding-bottom:56px; font-size:1.05rem; }
        .wrap { max-width:900px; margin:0 auto; }

        .neg  { color:var(--neg)!important; }
        .pos  { color:var(--pos)!important; }
        .warn { color:var(--warn)!important; }
        .muted{ color:var(--text-muted)!important; }
        .b  { border:1px solid var(--border); }
        .bb { border-bottom:1px solid var(--border); }
        .bt { border-top:1px solid var(--border); }
        .label { font-size:.82rem; text-transform:uppercase; letter-spacing:.08em; color:var(--text-muted); }
        @keyframes blink { 50%{opacity:0} }

        .card-db { background:var(--bg-surface); border:1px solid var(--border); padding:1.1rem; margin-bottom:1rem; }
        .x2 { background:rgba(227,179,65,.15); color:var(--warn); padding:.15rem .4rem; font-weight:700; font-size:.75rem; margin-left:5px; }
        .subtitle { font-size:.82rem; color:var(--text-muted); margin-top:2px; }

        /* ── BANNER ── */
        .banner {
            background:var(--bg-surface); border:1px solid var(--border);
            border-left:3px solid var(--accent); padding:1rem 1.1rem; margin-bottom:1.5rem;
        }
        .progress-bar-bg  { height:3px; background:var(--border); margin-bottom:1rem; }
        .progress-bar-fill{ height:100%; background:var(--accent); }

        .banner-last { margin-bottom:.9rem; }
        .banner-sep  { height:1px; background:var(--border); margin-bottom:.9rem; }
        .banner-next-label { font-size:.82rem; text-transform:uppercase; letter-spacing:.08em; color:var(--text-muted); margin-bottom:.35rem; }
        .banner-sess-label { font-size:.8rem; color:var(--text-muted); margin-bottom:.5rem; }

        /* countdown */
        .cd-wrap   { display:flex; align-items:flex-start; gap:.3rem; }
        .cd-block  { text-align:center; min-width:46px; }
        .cd-digits { font-size:1.75rem; font-weight:700; line-height:1; }
        .cd-unit   { font-size:.68rem; color:var(--text-muted); text-transform:uppercase; margin-top:2px; }
        .cd-sep    { font-size:1.4rem; font-weight:700; color:var(--border); padding-top:3px; }

        /* ── STANDINGS ── */
        .standings-header,
        .standings-main {
            display:grid;
            grid-template-columns: 28px 1fr 68px 38px 60px;
            align-items:center;
            gap:.4rem;
            padding:.65rem .85rem;
        }
        .standings-header { border-bottom:1px solid var(--border); background:var(--bg-surface); padding-top:.55rem; padding-bottom:.55rem; }
        .standings-row { border-bottom:1px solid var(--border); transition:background .1s; }
        .standings-row:last-child { border-bottom:none; }
        .standings-row:hover { background:var(--bg-hover); }
        .standings-row.leader-row { border-left:3px solid var(--warn); }
        .standings-main { cursor:pointer; }

        .s-rank { font-size:.88rem; color:var(--text-muted); text-align:center; }
        .s-name { font-weight:700; font-size:1.08rem; }
        .s-pts  { font-weight:700; font-size:1.08rem; color:var(--text-main); text-align:right; }
        .s-wins { font-size:.85rem; color:var(--text-muted); text-align:right; }
        .s-gap  { font-size:.85rem; text-align:right; }
        .s-chevron { font-size:.78rem; color:var(--text-muted); transition:transform .2s; display:inline-block; margin-left:5px; vertical-align:middle; }
        .s-chevron.open { transform:rotate(180deg); }

        /* accordion */
        .standings-detail { display:none; padding:.85rem .85rem 1rem; border-top:1px solid var(--border); background:rgba(0,0,0,.18); }
        .standings-detail.open { display:block; }
        .detail-section-title { font-size:.78rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:.07em; margin-bottom:.5rem; }
        .detail-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:.4rem; margin-bottom:.8rem; }
        .detail-item {
            display:flex; align-items:center; justify-content:space-between;
            padding:.5rem .6rem .5rem .75rem; border:1px solid var(--border);
            background:var(--bg-surface); font-size:.9rem; position:relative;
        }
        .detail-color-bar { width:2px; position:absolute; left:0; top:0; bottom:0; }
        .detail-item-code { font-weight:700; }
        .detail-item-name { font-size:.72rem; color:var(--text-muted); margin-top:1px; }
        .price-col   { text-align:right; }
        .price-curr  { font-size:.92rem; font-weight:700; color:var(--text-main); }
        .price-diff  { font-size:.68rem; margin-top:1px; }
        .price-init  { color:var(--text-muted); }

        .detail-total { display:grid; grid-template-columns:1fr 1fr; gap:.5rem; border-top:1px solid var(--border); padding-top:.65rem; margin-top:.1rem; }
        .detail-total-col { text-align:right; }
        .detail-total-col:first-child { text-align:left; }
        .detail-total-label { font-size:.7rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:.05em; margin-bottom:2px; }
        .detail-total-val   { font-size:1.05rem; font-weight:700; }
        .detail-total-diff  { font-size:.72rem; margin-top:1px; }

        /* ── CAROUSEL ── */
        .carousel-wrap { margin-bottom:.5rem; }
        .carousel {
            display:flex; gap:.5rem;
            overflow-x:auto; scroll-snap-type:x mandatory;
            scrollbar-width:none; padding:2px 4px 6px;
            -webkit-overflow-scrolling:touch;
        }
        .carousel::-webkit-scrollbar { display:none; }

        .race-card {
            flex-shrink:0; scroll-snap-align:start; width:106px;
            border:1px solid var(--border); background:var(--bg-surface);
            padding:.65rem .7rem .55rem; cursor:pointer;
            transition:border-color .15s, background .15s;
            position:relative; display:flex; flex-direction:column; gap:.25rem;
            overflow:hidden;
        }
        .race-card.is-done { background:rgba(96,182,142,.09); }
        .race-card.is-done:hover { background:rgba(96,182,142,.17); }
        .race-card.is-current { border-color:var(--accent); }
        .race-card.is-cancelled { border-left:3px solid var(--neg); pointer-events:none; opacity:.65; }
        .race-card:hover { background:var(--bg-hover); }
        .race-card.active { border-color:var(--accent); }
        .race-card.active::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:var(--accent); }
        .race-card.is-done.active { border-color:var(--pos); }
        .race-card.is-done.active::before { background:var(--pos); }
        .race-card.is-current.active::before { background:var(--accent); }

        .rc-round  { font-size:.68rem; color:var(--text-muted); display:flex; align-items:center; justify-content:space-between; gap:.3rem; }
        .rc-round-left { display:flex; align-items:center; gap:.3rem; }
        .rc-spr-badge  { font-size:.52rem; color:var(--warn); font-weight:700; letter-spacing:.04em; flex-shrink:0; }
        .rc-flag   { margin:.2rem 0 .1rem; }
        .rc-flag img { width:32px; height:20px; border:1px solid var(--border); display:block; }
        .rc-name   { font-size:.74rem; font-weight:700; line-height:1.25; }
        .rc-status { font-size:.64rem; text-transform:uppercase; letter-spacing:.04em; margin-top:.2rem; }
        .rc-status.completed { color:var(--pos); }
        .rc-status.current   { color:var(--accent); }
        .rc-status.upcoming  { color:var(--border); }
        .rc-status.cancelled { color:var(--neg); font-weight:700; }

        .dot { width:6px; height:6px; border-radius:50%!important; display:inline-block; flex-shrink:0; }
        .dot-completed { background:var(--pos); }
        .dot-current   { background:var(--accent); animation:blink 1s step-start infinite; }
        .dot-upcoming  { background:var(--border); }
        .dot-cancelled { background:var(--neg); }

        /* controls bar */
        .carousel-controls { display:flex; align-items:center; gap:.6rem; padding:.2rem 0; margin-bottom:.5rem; }
        .c-arrow {
            background:var(--bg-surface); border:1px solid var(--border);
            color:var(--text-main); width:36px; height:36px; flex-shrink:0;
            display:flex; align-items:center; justify-content:center;
            cursor:pointer; font-size:.85rem;
            transition:background .15s, border-color .15s, color .15s;
        }
        .c-arrow:hover { background:var(--bg-hover); border-color:var(--accent); color:var(--accent); }
        .scrubber { flex:1; height:36px; display:flex; align-items:center; cursor:pointer; position:relative; padding:0 4px; touch-action:none; }
        .scrubber-track  { width:100%; height:4px; background:var(--border); position:relative; }
        .scrubber-fill   { position:absolute; left:0; top:0; bottom:0; background:var(--accent); transition:width .1s; }
        .scrubber-thumb  { position:absolute; top:50%; transform:translate(-50%,-50%); width:12px; height:12px; background:var(--accent); border:2px solid var(--bg-base); }

        /* ── RACE HUB ── */
        .hub-row    { display:grid; grid-template-columns:1fr 74px 74px; gap:.5rem; align-items:center; padding:.42rem 0; font-size:.92rem; }
        .hub-row-hd { font-size:.75rem; color:var(--text-muted); text-transform:uppercase; }
        .hub-row > div:nth-child(2),
        .hub-row > div:nth-child(3) { text-align:right; padding-right:.2rem; }
        .driver-tag { border-left:2px solid; padding-left:7px; display:flex; align-items:center; }
    </style>
</head>

// ── 3. PRE-COMPUTATION ───────────────────────────────────
let STATE = {};

// Session order per format — last session = round fully complete
const LAST_SESSION = { std: "race", spr: "race" };
const SESSION_ORDER_STD = ["fp1","fp2","fp3","qualy","race"];
const SESSION_ORDER_SPR = ["fp1","sprint_qualy","sprint","qualy","race"];

function sessionOrder(fmt) {
    return fmt === "spr" ? SESSION_ORDER_SPR : SESSION_ORDER_STD;
}

// A round is fully complete only when updated_to === "race"
function isRoundComplete(r) {
    const rd = RESULTS[r.id];
    return rd && rd.updated_to === "race";
}

// A round has partial data (some sessions done, not all)
function isRoundPartial(r) {
    const rd = RESULTS[r.id];
    return rd && rd.updated_to && rd.updated_to !== "race";
}

// Round status:
//   cancelled  → cancelled
//   completed  → RESULTS exists AND updated_to === "race"
//   current    → no data yet OR partial data
//   upcoming   → everything else future
function getRoundStatus(r) {
    if (r.status === 'cancelled') return 'cancelled';
    if (isRoundComplete(r))      return 'completed';
    if (isRoundPartial(r))       return 'current';   // partial → still current
    if (currentRound && r.id === currentRound.id) return 'current';
    return 'upcoming';
}

// Current round = last round with partial data, or first round with no data after last complete
function deriveCurrentRound() {
    // If any round has partial data, that's the current one
    for (const r of REG.rounds) {
        if (isRoundPartial(r)) return r;
    }
    // Otherwise: first non-cancelled after last fully completed
    const completedIds = new Set(REG.rounds.filter(r => isRoundComplete(r)).map(r => r.id));
    let lastIdx = -1;
    REG.rounds.forEach((r, i) => { if (completedIds.has(r.id)) lastIdx = i; });
    for (let i = lastIdx + 1; i < REG.rounds.length; i++) {
        if (REG.rounds[i].status !== 'cancelled') return REG.rounds[i];
    }
    if (lastIdx >= 0) return REG.rounds[lastIdx];
    return REG.rounds.find(r => r.status !== 'cancelled') ?? null;
}

// Latest price for a code in drivers or constructors:
// walks completed rounds in order, returns the last one that has a price field
function latestPrice(code, type) {
    let price = null;
    for (const r of REG.rounds) {
        const rd = RESULTS[r.id]; if (!rd) continue;
        const entry = rd[type]?.[code];
        if (entry?.price != null) price = entry.price;
    }
    return price; // null if never set — caller falls back to init_price
}

function precompute() {
    REG.championships.forEach(league => {
        const players = league.players.map(p => {
            const rounds = {};
            let totalPts = 0, totalExp = 0;

            REG.rounds.forEach(r => {
                const rd = RESULTS[r.id]; if (!rd) return;
                let rPts = 0, rExp = 0;
                const dBrk = {}, cBrk = {};
                [p.team.captain, ...p.team.drivers].forEach(d => {
                    const isCap = d === p.team.captain;
                    const base  = rd.drivers[d]; if (!base) return;
                    const pts = isCap ? base.pts * 2 : base.pts;
                    const exp = isCap ? base.exp * 2 : base.exp;
                    dBrk[d] = { pts, exp, isCap };
                    rPts += pts; rExp += exp;
                });
                p.team.constructors.forEach(c => {
                    const base = rd.constructors[c]; if (!base) return;
                    cBrk[c] = { pts: base.pts, exp: base.exp };
                    rPts += base.pts; rExp += base.exp;
                });
                const acc = rExp !== 0 ? Math.max(0, 100 - Math.abs(rPts - rExp) / Math.abs(rExp) * 100) : 0;
                rounds[r.id] = { pts: rPts, exp: rExp, acc, drivers: dBrk, constructors: cBrk };
                totalPts += rPts; totalExp += rExp;
            });

            const totalAcc = totalExp !== 0 ? Math.max(0, 100 - Math.abs(totalPts - totalExp) / Math.abs(totalExp) * 100) : 0;

            // Budget: use latest price from RESULTS, fallback to init_price
            const allDrivers = [p.team.captain, ...p.team.drivers];
            const budgetInit = allDrivers.reduce((s, d) => s + (REG.drivers[d]?.init_price ?? 0), 0)
                             + p.team.constructors.reduce((s, c) => s + (REG.constructors[c]?.init_price ?? 0), 0);
            const budgetCurr = allDrivers.reduce((s, d) => s + (latestPrice(d, 'drivers') ?? REG.drivers[d]?.init_price ?? 0), 0)
                             + p.team.constructors.reduce((s, c) => s + (latestPrice(c, 'constructors') ?? REG.constructors[c]?.init_price ?? 0), 0);

            return { ...p, rounds, totalPts, totalExp, totalAcc, budgetInit, budgetCurr };
        });

        const sorted = [...players].sort((a, b) => b.totalPts - a.totalPts);
        const leaderPts = sorted[0]?.totalPts ?? 0;
        sorted.forEach((p, i) => { p.rank = i + 1; p.gap = p.totalPts - leaderPts; });
        sorted.forEach(p => { p.wins = 0; });
        REG.rounds.filter(r => isRoundComplete(r)).forEach(r => {
            let best = -Infinity, winners = [];
            players.forEach(p => {
                const rp = p.rounds[r.id]?.pts ?? -Infinity;
                if (rp > best) { best = rp; winners = [p.code]; }
                else if (rp === best) winners.push(p.code);
            });
            winners.forEach(code => { const p = sorted.find(x => x.code === code); if (p) p.wins++; });
        });

        STATE[league.key] = { players: sorted };
    });
}

// ── 4. HELPERS ───────────────────────────────────────────
function pad(n) { return String(n).padStart(2, '0'); }
function formatCD(ms) {
    if (ms <= 0) return { d:'00', h:'00', m:'00', s:'00' };
    const t = Math.floor(ms / 1000);
    return { d:pad(Math.floor(t/86400)), h:pad(Math.floor((t%86400)/3600)), m:pad(Math.floor((t%3600)/60)), s:pad(t%60) };
}
function accClass(v)  { return v >= 80 ? 'pos' : v >= 60 ? 'warn' : 'neg'; }
function ptsClass(v)  { return v < 0 ? 'neg' : ''; }
function diffHtml(diff, small) {
    const fs = small ? 'font-size:.68rem' : '';
    if (diff === 0) return `<span class="muted" style="${fs}">=</span>`;
    return diff > 0
        ? `<span class="pos"  style="${fs}">+${diff.toFixed(1)}</span>`
        : `<span class="neg"  style="${fs}">${diff.toFixed(1)}</span>`;
}
function shortName(fullName) {
    if (!fullName) return '';
    const parts = fullName.trim().split(' ');
    return parts.length < 2 ? fullName : parts[0][0] + '. ' + parts.slice(1).join(' ');
}

function nextSession(round) {
    if (!round.sessions) return null;
    const order  = round.fmt === 'spr' ? ['fp1','sq','sprint','q','race'] : ['fp1','fp2','fp3','q','race'];
    const labels = { fp1:'FP1', fp2:'FP2', fp3:'FP3', sprint_qualy:'SPRINT_Q', sprint:'SPRINT', qualy:'QUALIFYING', race:'RACE' };
    const now = Date.now();
    for (const key of order) {
        const iso = round.sessions[key]; if (!iso) continue;
        const t = new Date(iso).getTime();
        if (t > now) return { key, label: labels[key] ?? key.toUpperCase(), iso, ms: t - now };
    }
    return null;
}

function lastCompletedRound() {
    let last = null;
    for (const r of REG.rounds) { if (isRoundComplete(r)) last = r; }
    return last;
}

// ── 6. LIVE CLOCK + UPDATED STATUS ───────────────────────
function startClock() {
    function tick() {
        const now = new Date();
        const d = now.toLocaleDateString('it-IT', { weekday:'short', day:'2-digit', month:'short', year:'numeric' });
        const t = now.toLocaleTimeString('it-IT', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
        const el = document.getElementById('live-clock');
        if (el) el.textContent = d.toUpperCase() + ' // ' + t;
        renderUpdatedStatus(now);
    }
    tick();
    setInterval(tick, 1000);
}

function renderUpdatedStatus(now) {
    const el = document.getElementById('updated-status');
    if (!el || !currentRound) return;

    const rd    = RESULTS[currentRound.id];
    const order = sessionOrder(currentRound.fmt);
    const sess  = currentRound.sessions ?? {};

    // Find the last session that has already started
    let lastStarted = null;
    for (const key of order) {
        if (sess[key] && new Date(sess[key]) < now) lastStarted = key;
    }

    if (!lastStarted) {
        // No session started yet
        el.innerHTML = `UPDATED: <span style="color:var(--text-muted);font-weight:700">—</span>`;
        return;
    }

    // Case-insensitive match with updated_to → TRUE, else FALSE
    const updatedTo = rd?.updated_to?.toLowerCase() ?? null;
    if (updatedTo === lastStarted.toLowerCase()) {
        el.innerHTML = `UPDATED: <span style="color:var(--pos);font-weight:700">TRUE</span> <span style="color:var(--text-muted);font-size:.7rem">(${lastStarted.toUpperCase()})</span>`;
    } else {
        el.innerHTML = `UPDATED: <span style="color:var(--neg);font-weight:700">FALSE</span> <span style="color:var(--text-muted);font-size:.7rem">(${lastStarted.toUpperCase()})</span>`;
    }
}

                <div class="detail-total-col">
                    <div class="detail-total-label">CURRENT VALUE</div>
                    <div class="detail-total-val">${p.budgetCurr.toFixed(1)}M</div>
                    <div class="detail-total-diff">${diffHtml(budgetDiff, false)}</div>
                </div>
            </div>`;

        html += `<div class="standings-row${isLeader ? ' leader-row' : ''}">
            <div class="standings-main" onclick="toggleDetail('sd-${p.code}',this)">
                <div class="s-rank">${p.rank}</div>
                <div class="s-name">${p.name}<i class="bi bi-chevron-down s-chevron"></i></div>
                <div class="s-pts" style="color:${isLeader ? 'var(--warn)' : 'var(--text-main)'}">${p.totalPts}</div>
                <div class="s-wins">${p.wins}</div>
                <div class="s-gap">${gapHtml}</div>
            </div>
            <div class="standings-detail" id="sd-${p.code}">
                <div class="detail-section-title">DRIVERS</div>
                <div class="detail-grid">${dRows}</div>
                <div class="detail-section-title">CONSTRUCTORS</div>
                <div class="detail-grid">${cRows}</div>
                ${totalBlock}
            </div>
        </div>`;
    });

    wrap.innerHTML = html;
}

function toggleDetail(id, rowEl) {
    const detail  = document.getElementById(id);
    const chevron = rowEl.querySelector('.s-chevron');
    const isOpen  = detail.classList.toggle('open');
    chevron?.classList.toggle('open', isOpen);
}

// ── 9. CAROUSEL ──────────────────────────────────────────
function renderCarousel() {
    const el      = document.getElementById('carousel');
    const dotMap  = { completed:'dot-completed', current:'dot-current', upcoming:'dot-upcoming', cancelled:'dot-cancelled' };
    const stLabel = { completed:'DONE', current:'CURRENT', cancelled:'CANCELLED' };

    el.innerHTML = REG.rounds.map(r => {
        const status  = getRoundStatus(r);
        const isSel   = r.id === selectedRound;
        const cc      = REG.flagCodes[r.id] ?? 'un';
        const classes = ['race-card',
            status === 'completed' ? 'is-done'     : '',
            status === 'current'   ? 'is-current'  : '',
            status === 'cancelled' ? 'is-cancelled': '',
            isSel                  ? 'active'      : ''
        ].filter(Boolean).join(' ');

        const sprintBadge = r.fmt === 'spr' ? `<span class="rc-spr-badge">SPRINT</span>` : '';

        return `<div class="${classes}" onclick="selectRace('${r.id}')">
            <div class="rc-round">
                <div class="rc-round-left">
                    <span class="dot ${dotMap[status] ?? 'dot-upcoming'}"></span>
                    <span>R${pad(r.n)}</span>
                </div>
                ${sprintBadge}
            </div>
            <div class="rc-flag">
                <img src="https://flagcdn.com/w40/${cc}.png" alt="${r.name}" loading="lazy">
            </div>
            <div class="rc-name">${r.name}</div>
            ${stLabel[status] ? `<div class="rc-status ${status}">${stLabel[status]}</div>` : ''}
        </div>`;
    }).join('');

    setTimeout(() => {
        const active = el.querySelector('.active');
        if (active) active.scrollIntoView({ behavior:'smooth', block:'nearest', inline:'center' });
        setTimeout(syncScrubber, 400);
    }, 60);

    if (!el._scrubListening) {
        el.addEventListener('scroll', syncScrubber, { passive: true });
        el._scrubListening = true;
    }
}

function shiftCar(steps) {
    document.getElementById('carousel').scrollBy({ left: steps * 114, behavior:'smooth' });
    setTimeout(syncScrubber, 300);
}
function syncScrubber() {
    const c     = document.getElementById('carousel');
    const fill  = document.getElementById('scrubber-fill');
    const thumb = document.getElementById('scrubber-thumb');
    if (!c || !fill || !thumb) return;
    const max = c.scrollWidth - c.clientWidth;
    const pct = max > 0 ? (c.scrollLeft / max) * 100 : 0;
    fill.style.width = pct + '%';
    thumb.style.left = pct + '%';
}
function scrubberClick(e) {
    const s = document.getElementById('scrubber');
    const c = document.getElementById('carousel');
    if (!s || !c) return;
    const rect = s.getBoundingClientRect();
    const pct  = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
    c.scrollLeft = pct * (c.scrollWidth - c.clientWidth);
    syncScrubber();
}
function selectRace(id) { selectedRound = id; renderCarousel(); renderHub(); }

// ── 10. RACE HUB ─────────────────────────────────────────
function renderHub() {
    const round  = REG.rounds.find(r => r.id === selectedRound);
    const hub    = document.getElementById('hub');
    if (!round) return;

    const status = getRoundStatus(round);

    if (status === 'cancelled') {
        hub.innerHTML = `<div class="card-db text-center muted py-4" style="border-left:3px solid var(--neg)">
            <i class="bi bi-x-circle me-2" style="color:var(--neg)"></i>RACE_CANCELLED &mdash; Round annullato dal calendario</div>`;
        return;
    }
    if (status === 'upcoming') {
        const sess = nextSession(round);
        hub.innerHTML = `<div class="card-db text-center py-4">
            <div class="label mb-2">GARA NON ANCORA DISPUTATA</div>
            <div style="font-size:1.15rem;font-weight:700">${round.flag} ${round.name.toUpperCase()}</div>
            <div class="label mt-1">${round.date}${round.fmt === 'spr' ? ' &nbsp;|&nbsp; SPRINT_WEEKEND' : ''}</div>
            ${sess ? `<div class="mt-2" style="font-size:.82rem;color:var(--text-muted)"><i class="bi bi-clock me-1"></i>Prossima sessione: <span style="color:var(--accent)">${sess.label}</span></div>` : ''}
        </div>`;
        return;
    }

    // completed or current (partial data) — show whatever data exists
    const rd = RESULTS[round.id];
    if (!rd) {
        // current with no data yet
        const sess = nextSession(round);
        hub.innerHTML = `<div class="card-db text-center py-4">
            <div class="label mb-2">GARA CORRENTE</div>
            <div style="font-size:1.15rem;font-weight:700">${round.flag} ${round.name.toUpperCase()}</div>
            <div class="label mt-1">${round.date}${round.fmt === 'spr' ? ' &nbsp;|&nbsp; SPRINT_WEEKEND' : ''}</div>
            ${sess ? `<div class="mt-2" style="font-size:.82rem;color:var(--text-muted)"><i class="bi bi-clock me-1"></i>Prossima sessione: <span style="color:var(--accent)">${sess.label}</span></div>` : ''}
        </div>`;
        return;
    }
    // sort players by pts for this round (descending), find winner
    const playersWithData = league().players
        .map(p => ({ p, rData: p.rounds[round.id] }))
        .sort((a, b) => (b.rData?.pts ?? -Infinity) - (a.rData?.pts ?? -Infinity));

    const maxPts = playersWithData[0]?.rData?.pts ?? -Infinity;

    hub.innerHTML = playersWithData.map(({ p, rData }) => {
        if (!rData) return `<div class="card-db"><span class="label">NO_DATA &mdash; ${p.name}</span></div>`;

        const isWinner = rData.pts === maxPts && maxPts > -Infinity;

        let dRows = `<div class="hub-row hub-row-hd"><div>DRIVER</div><div>PTS</div><div>EXP</div></div>`;
        [p.team.captain, ...p.team.drivers].forEach(d => {
            const dd  = rData.drivers[d]; if (!dd) return;
            const con = REG.drivers[d]?.constructor?.toLowerCase() ?? 'cad';
            dRows += `<div class="hub-row">
                <div class="driver-tag" style="border-color:var(--${con})">${d}${dd.isCap ? '<span class="x2">X2</span>' : ''}</div>
                <div class="${ptsClass(dd.pts)}">${dd.pts}</div>
                <div class="${ptsClass(dd.exp)}">${dd.exp.toFixed(1)}</div>
            </div>`;
        });

        let cRows = `<div class="hub-row hub-row-hd" style="margin-top:.5rem;padding-top:.5rem;border-top:1px solid var(--border)"><div>CONSTRUCTOR</div><div>PTS</div><div>EXP</div></div>`;
        p.team.constructors.forEach(c => {
            const cd  = rData.constructors[c]; if (!cd) return;
            cRows += `<div class="hub-row">
                <div class="driver-tag" style="border-color:var(--${c.toLowerCase()})">${c}</div>
                <div class="${ptsClass(cd.pts)}">${cd.pts}</div>
                <div class="${ptsClass(cd.exp)}">${cd.exp.toFixed(1)}</div>
            </div>`;
        });

        const acc = rData.acc.toFixed(0);
        return `<div class="card-db"${isWinner ? ' style="border:3px solid var(--warn)"' : ''}>
            <div class="d-flex justify-content-between align-items-center bb pb-2 mb-2">
                <span style="font-weight:700">${p.name}${isWinner ? ' <i class="bi bi-trophy-fill" style="color:var(--warn);font-size:.85rem;margin-left:4px"></i>' : ''}</span>
                <span style="font-weight:700;color:${isWinner ? 'var(--warn)' : 'var(--text-main)'}">${rData.pts} PTS</span>
            </div>
            ${dRows}${cRows}
            <div class="d-flex justify-content-between bt mt-3 pt-2" style="font-size:.8rem">
                <span class="muted">EXPECTED <b style="color:var(--text-main)">${rData.exp.toFixed(1)} PTS</b></span>
                <span class="muted">ACCURACY <b class="${accClass(+acc)}">${acc}%</b></span>
            </div>
        </div>`;
    }).join('');
}

// ── 11. INIT ─────────────────────────────────────────────
window.onload = () => {
    const key = new URLSearchParams(window.location.search).get('key') || 'predestinati';
    activeKey = key;

    // currentRound must be set before precompute calls getRoundStatus
    currentRound = deriveCurrentRound();
    precompute();

    const lg     = REG.championships.find(c => c.key === key);
    const lgName = lg?.name ?? '—';
    document.getElementById('league-name').textContent = lgName;
    document.title = lgName + ' // F1 FANTASY DATABASE';

    const last    = lastCompletedRound();
    selectedRound = currentRound?.id ?? REG.rounds[0].id;

    startClock();
    renderBanner();
    renderStandings();
    renderCarousel();
    renderHub();
};
</script>
